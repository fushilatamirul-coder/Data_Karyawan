<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Karyawan · 65 Karyawan</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- html2pdf library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #edf2f7 100%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      max-width: 1300px;
      width: 100%;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 20px 40px -12px rgba(0,20,40,0.35);
      border: 1px solid rgba(255,255,255,0.7);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      color: #0b2b3c;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
      letter-spacing: -0.3px;
    }

    h1 i {
      color: #2a7faa;
      font-size: 2rem;
    }

    .subhead {
      color: #2c5770;
      font-weight: 400;
      font-size: 1rem;
      margin-bottom: 2rem;
      border-left: 4px solid #2a7faa;
      padding-left: 1rem;
      background: rgba(42, 127, 170, 0.06);
      border-radius: 0 12px 12px 0;
      width: fit-content;
      padding: 0.5rem 1.2rem;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 900px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
        gap: 1.8rem;
      }
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      padding: 1.8rem 1.8rem 2rem;
      box-shadow: 0 8px 24px rgba(0, 32, 64, 0.08);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.5);
      transition: 0.2s ease;
    }

    .card-title {
      font-weight: 600;
      font-size: 1.25rem;
      color: #1a4052;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border-bottom: 2px dashed #dce9f2;
      padding-bottom: 0.7rem;
    }

    .card-title i {
      color: #2a7faa;
      width: 1.8rem;
    }

    .form-group {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      font-weight: 500;
      color: #1d4a62;
      margin-bottom: 0.3rem;
      font-size: 0.9rem;
      letter-spacing: 0.2px;
    }

    label i {
      margin-right: 6px;
      color: #2a7faa;
      width: 1.2rem;
    }

    input, select {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1.5px solid #dbe4ed;
      border-radius: 18px;
      background: #f9fcff;
      font-size: 0.95rem;
      transition: all 0.2s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #2a7faa;
      background: white;
      box-shadow: 0 0 0 4px rgba(42, 127, 170, 0.15);
    }

    .file-upload-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f2f8fe;
      padding: 0.3rem 0.3rem 0.3rem 1rem;
      border-radius: 40px;
      border: 1.5px dashed #b6d2e8;
      transition: 0.2s;
    }

    .file-upload-wrapper:hover {
      border-color: #2a7faa;
      background: #edf5fd;
    }

    .file-upload-wrapper input[type="file"] {
      border: none;
      padding: 0.3rem 0;
      background: transparent;
      width: auto;
      flex: 1;
    }

    .file-upload-wrapper input[type="file"]::file-selector-button {
      background: #2a7faa;
      color: white;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      margin-right: 1rem;
      transition: 0.15s;
      cursor: pointer;
    }

    .file-upload-wrapper input[type="file"]::file-selector-button:hover {
      background: #1d5f82;
      transform: scale(0.96);
    }

    .preview-img {
      margin-top: 0.5rem;
      max-width: 100%;
      max-height: 140px;
      border-radius: 16px;
      border: 1px solid #c7dae9;
      object-fit: cover;
      background: #f0f6fc;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 1.2rem 0 0.2rem;
    }

    .btn {
      border: none;
      padding: 0.7rem 1.6rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.95rem;
      background: #e3edf6;
      color: #1f4b62;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      border: 1px solid transparent;
    }

    .btn-primary {
      background: #1f5e7e;
      color: white;
      box-shadow: 0 6px 14px rgba(26, 89, 128, 0.25);
    }

    .btn-primary:hover {
      background: #12455f;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(18, 69, 95, 0.3);
    }

    .btn-success {
      background: #1f8b6b;
      color: white;
      box-shadow: 0 6px 14px rgba(26, 128, 89, 0.25);
    }

    .btn-success:hover {
      background: #136e53;
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #2a7faa;
      color: #1d5f7e;
    }

    .btn-outline:hover {
      background: #2a7faa10;
      border-color: #1a5a78;
    }

    .btn-danger-outline {
      background: transparent;
      border: 1.5px solid #b94a6b;
      color: #9d3b58;
    }

    .btn-danger-outline:hover {
      background: #b94a6b10;
      border-color: #8f3450;
    }

    .table-responsive {
      overflow-x: auto;
      border-radius: 20px;
      background: #ffffffcc;
      backdrop-filter: blur(2px);
      padding: 0.2rem 0 0.2rem 0;
      max-height: 500px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      min-width: 600px;
    }

    th {
      background: #e6f0f8;
      color: #1a4052;
      font-weight: 600;
      padding: 0.9rem 0.8rem;
      text-align: left;
      border-bottom: 2px solid #bccfdf;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    td {
      padding: 0.8rem 0.8rem;
      border-bottom: 1px solid #d6e3ef;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .ktp-thumb {
      max-width: 60px;
      max-height: 45px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #cbdae8;
      background: white;
    }

    .badge-empty {
      color: #6f8fa5;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .action-icon {
      color: #2f6c8a;
      margin: 0 4px;
      cursor: pointer;
      transition: 0.1s;
      font-size: 1rem;
    }

    .action-icon:hover {
      color: #c7456a;
      transform: scale(1.2);
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 1.8rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    #pdf-export-content {
      display: none;
    }

    .scroll-indicator {
      text-align: right;
      font-size: 0.8rem;
      color: #6f8fa5;
      margin-top: 0.3rem;
      padding-right: 0.5rem;
    }

    @media (max-width: 480px) {
      .container { padding: 1rem; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="container" id="mainApp">
  <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
    <div>
      <h1><i class="fas fa-id-card"></i> Data Karyawan</h1>
      <div class="subhead"><i class="fas fa-upload" style="margin-right: 8px;"></i> Upload KTP & Ekspor PDF · <strong>65 Karyawan</strong></div>
    </div>
    <div style="display: flex; gap: 0.6rem; margin-bottom: 0.5rem;">
      <button class="btn btn-success" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> Ekspor PDF</button>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="card">
      <div class="card-title"><i class="fas fa-user-plus"></i> Tambah Karyawan</div>
      <form id="employeeForm">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Nama Lengkap</label>
          <input type="text" id="nama" placeholder="Nama karyawan" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-briefcase"></i> Posisi / Jabatan</label>
          <input type="text" id="posisi" placeholder="Contoh: Frontend Developer" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-building"></i> Departemen</label>
          <select id="departemen">
            <option value="Administrasi">Administrasi</option>
            <option value="Operasional">Operasional</option>
            <option value="Gudang">Gudang</option>
            <option value="Kasir">Kasir</option>
            <option value="Waiters">Waiters</option>
            <option value="Security/Keamanan">Security/Keamanan</option>
            <option value="Keuangan">Keuangan</option>
            <option value="Maintenance">Maintenance</option>
            <option value="Bar (Barista)">Bar (Barista)</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-credit-card"></i> Upload KTP (foto)</label>
          <div class="file-upload-wrapper">
            <input type="file" id="ktpUpload" accept="image/*">
          </div>
          <div style="margin-top: 8px;">
            <img id="ktpPreview" class="preview-img" src="#" alt="Preview KTP" style="display: none;">
          </div>
        </div>
        <div class="btn-group">
          <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Simpan Karyawan</button>
          <button type="reset" class="btn btn-outline"><i class="fas fa-undo-alt"></i> Reset</button>
        </div>
      </form>
    </div>

    <div class="card">
      <div class="card-title"><i class="fas fa-list-ul"></i> Ringkasan</div>
      <div style="display: flex; flex-direction: column; gap: 0.6rem;">
        <div><i class="fas fa-users" style="color: #2a7faa; width: 1.8rem;"></i> Total Karyawan: <strong id="totalKaryawan">0</strong></div>
        <div><i class="fas fa-image" style="color: #2a7faa; width: 1.8rem;"></i> KTP terupload: <span id="ktpCount">0</span></div>
        <div style="border-top: 1px dashed #c7dae9; padding-top: 0.8rem; color: #2c5770; font-size: 0.9rem;">
          <i class="fas fa-info-circle"></i> Klik <i class="fas fa-trash-alt" style="color: #b94a6b;"></i> pada tabel untuk hapus.
        </div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top: 0.2rem;">
    <div class="card-title"><i class="fas fa-table"></i> Daftar Karyawan (65 Data)</div>
    <div class="table-responsive" id="tableContainer">
      <table id="employeeTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Nama</th>
            <th>Posisi</th>
            <th>Departemen</th>
            <th>KTP</th>
            <th style="text-align: center;">Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="scroll-indicator"><i class="fas fa-arrow-up"></i> Scroll untuk melihat semua data</div>
    <div class="footer-actions">
      <button class="btn btn-outline" id="clearAllBtn"><i class="fas fa-trash-alt"></i> Hapus Semua</button>
    </div>
  </div>
</div>

<!-- hidden content for PDF export -->
<div id="pdf-export-content">
  <style>
    #pdf-export-content { font-family: 'Segoe UI', sans-serif; padding: 20px; background: white; }
    #pdf-export-content table { width: 100%; border-collapse: collapse; }
    #pdf-export-content th, #pdf-export-content td { border: 1px solid #aaa; padding: 8px 10px; text-align: left; }
    #pdf-export-content th { background: #e6f0f8; }
    #pdf-export-content img { max-width: 70px; max-height: 50px; object-fit: cover; border-radius: 6px; }
    .pdf-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.2rem; color: #0b2b3c; }
    .pdf-sub { color: #2c5770; margin-bottom: 1.5rem; border-bottom: 2px solid #2a7faa; padding-bottom: 0.3rem; }
  </style>
  <div class="pdf-title"><i class="fas fa-id-card"></i> Laporan Data Karyawan</div>
  <div class="pdf-sub">Total 65 Karyawan + KTP terupload</div>
  <div id="pdfTableWrapper"></div>
  <div style="margin-top: 1.2rem; color: #2c5770; font-size: 0.8rem;">Dicetak: <span id="pdfDate"></span></div>
</div>

<script>
  (function() {
    "use strict";

    const form = document.getElementById('employeeForm');
    const namaInput = document.getElementById('nama');
    const posisiInput = document.getElementById('posisi');
    const departemenSelect = document.getElementById('departemen');
    const ktpFileInput = document.getElementById('ktpUpload');
    const ktpPreview = document.getElementById('ktpPreview');
    const tableBody = document.getElementById('tableBody');
    const totalKaryawanSpan = document.getElementById('totalKaryawan');
    const ktpCountSpan = document.getElementById('ktpCount');
    const exportBtn = document.getElementById('exportPdfBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    let employees = [];
    let idCounter = 1;

    function updateStats() {
      totalKaryawanSpan.textContent = employees.length;
      const withKtp = employees.filter(e => e.ktpDataUrl && e.ktpDataUrl.length > 0);
      ktpCountSpan.textContent = withKtp.length;
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    function renderTable() {
      if (employees.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 2rem 0; color: #6f8fa5;"><i class="fas fa-inbox"></i> Belum ada data karyawan</td></tr>`;
        updateStats();
        return;
      }

      let html = '';
      employees.forEach((emp, index) => {
        const ktpThumb = emp.ktpDataUrl && emp.ktpDataUrl.length > 0 
          ? `<img src="${emp.ktpDataUrl}" alt="KTP" class="ktp-thumb">` 
          : '<span style="color:#8aa9c0;"><i class="fas fa-times-circle"></i> tidak ada</span>';
        html += `<tr>
          <td>${index + 1}</td>
          <td><strong>${escHtml(emp.nama)}</strong></td>
          <td>${escHtml(emp.posisi)}</td>
          <td>${escHtml(emp.departemen)}</td>
          <td>${ktpThumb}</td>
          <td style="text-align:center;">
            <i class="fas fa-trash-alt action-icon" data-id="${emp.id}" title="Hapus karyawan"></i>
          </td>
        </tr>`;
      });
      tableBody.innerHTML = html;
      updateStats();

      document.querySelectorAll('.action-icon[data-id]').forEach(icon => {
        icon.addEventListener('click', function(e) {
          const id = parseInt(this.getAttribute('data-id'), 10);
          if (confirm('Hapus data karyawan ini?')) {
            employees = employees.filter(emp => emp.id !== id);
            renderTable();
          }
        });
      });
    }

    function addEmployee(nama, posisi, departemen, ktpDataUrl) {
      const newEmp = {
        id: idCounter++,
        nama: nama.trim(),
        posisi: posisi.trim(),
        departemen: departemen,
        ktpDataUrl: ktpDataUrl || ''
      };
      employees.push(newEmp);
      renderTable();
    }

    // Generate 65 data karyawan otomatis dengan 9 departemen
    function generateDummyData() {
      const names = [
        'Andi Pratama', 'Siti Rahayu', 'Budi Santoso', 'Dewi Lestari', 'Eko Saputra',
        'Fitriani Nur', 'Gilang Ramadhan', 'Hani Fitriah', 'Irfan Hakim', 'Joko Widodo',
        'Kartika Sari', 'Lukman Hakim', 'Mega Puspita', 'Nadia Rahma', 'Oscar Pratama',
        'Putri Ayu', 'Qodir Fajar', 'Rina Melati', 'Samsul Arifin', 'Tina Marlina',
        'Umar Bakri', 'Vina Aulia', 'Wahyu Hidayat', 'Xena Olivia', 'Yusuf Kurniawan',
        'Zahra Fadhilah', 'Ahmad Fauzi', 'Bella Safira', 'Cahya Nugraha', 'Dinda Permata',
        'Eka Novita', 'Faisal Rahman', 'Gita Puspita', 'Hendra Wijaya', 'Indah Lestari',
        'Jefri Alamsyah', 'Kusuma Dewi', 'Laila Qodri', 'Miftahul Jannah', 'Nurul Huda',
        'Oktavia Sari', 'Purnama Sari', 'Rizki Amelia', 'Sinta Dewi', 'Taufik Hidayat',
        'Ulfah Khairunnisa', 'Viktor Arifin', 'Winda Rahmawati', 'Yoga Pratama', 'Zaki Firdaus',
        'Agung Saputro', 'Bintang Ramadhan', 'Citra Kirana', 'Doni Salman', 'Eva Mulyani',
        'Fajar Setiawan', 'Galuh Candra', 'Hafidz Al-Ghifari', 'Indra Gunawan', 'Jihan Fadhilah',
        'Kiki Armaya', 'Luthfi Hakim', 'Maya Sari', 'Naufal Fikri', 'Oki Setiana'
      ];

      const positions = [
        'Staff Administrasi', 'Supervisor Operasional', 'Kepala Gudang', 'Kasir Senior',
        'Waiters', 'Security', 'Staff Keuangan', 'Teknisi Maintenance', 'Barista Senior',
        'Manajer Operasional', 'Asisten Administrasi', 'Staff Gudang', 'Kasir Junior',
        'Captain Waiters', 'Kepala Security', 'Staff Accounting', 'Maintenance Staff',
        'Barista Junior', 'Admin HRD', 'Logistik Staff'
      ];

      const departments = [
        'Administrasi', 'Operasional', 'Gudang', 'Kasir', 'Waiters',
        'Security/Keamanan', 'Keuangan', 'Maintenance', 'Bar (Barista)'
      ];

      for (let i = 0; i < 65 && i < names.length; i++) {
        const pos = positions[i % positions.length];
        const dept = departments[i % departments.length];
        // 30% data memiliki KTP dummy
        let ktp = '';
        if (i % 3 === 0) {
          ktp = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';
        }
        addEmployee(names[i], pos, dept, ktp);
      }
    }

    // Form submit
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const nama = namaInput.value.trim();
      const posisi = posisiInput.value.trim();
      const departemen = departemenSelect.value;
      const file = ktpFileInput.files[0];

      if (!nama || !posisi) {
        alert('Nama dan Posisi harus diisi.');
        return;
      }

      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          const dataUrl = ev.target.result;
          addEmployee(nama, posisi, departemen, dataUrl);
          ktpPreview.src = dataUrl;
          ktpPreview.style.display = 'block';
          form.reset();
          ktpPreview.style.display = 'none';
          ktpPreview.src = '#';
          ktpFileInput.value = '';
        };
        reader.readAsDataURL(file);
      } else {
        addEmployee(nama, posisi, departemen, '');
        form.reset();
        ktpPreview.style.display = 'none';
        ktpPreview.src = '#';
        ktpFileInput.value = '';
      }
    });

    ktpFileInput.addEventListener('change', function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          ktpPreview.src = ev.target.result;
          ktpPreview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      } else {
        ktpPreview.style.display = 'none';
        ktpPreview.src = '#';
      }
    });

    clearAllBtn.addEventListener('click', function() {
      if (employees.length === 0) {
        alert('Tidak ada data untuk dihapus.');
        return;
      }
      if (confirm('Hapus SEMUA data karyawan?')) {
        employees = [];
        renderTable();
        ktpPreview.style.display = 'none';
        ktpPreview.src = '#';
        ktpFileInput.value = '';
        form.reset();
      }
    });

    // Ekspor PDF
    exportBtn.addEventListener('click', function() {
      if (employees.length === 0) {
        alert('Tidak ada data karyawan untuk diekspor.');
        return;
      }

      const pdfContainer = document.getElementById('pdf-export-content');
      const wrapper = document.getElementById('pdfTableWrapper');
      
      let tableHtml = `<table>
        <thead><tr><th>#</th><th>Nama</th><th>Posisi</th><th>Departemen</th><th>KTP</th></tr></thead><tbody>`;
      
      employees.forEach((emp, idx) => {
        const ktpImg = emp.ktpDataUrl && emp.ktpDataUrl.length > 0 
          ? `<img src="${emp.ktpDataUrl}" alt="KTP" style="max-width:70px; max-height:50px; object-fit:cover; border-radius:6px;">` 
          : '<span style="color:#888;">tidak ada</span>';
        tableHtml += `<tr>
          <td>${idx+1}</td>
          <td>${escHtml(emp.nama)}</td>
          <td>${escHtml(emp.posisi)}</td>
          <td>${escHtml(emp.departemen)}</td>
          <td>${ktpImg}</td>
        </tr>`;
      });
      tableHtml += `</tbody></table>`;
      wrapper.innerHTML = tableHtml;
      document.getElementById('pdfDate').textContent = new Date().toLocaleString('id-ID');

      pdfContainer.style.display = 'block';
      
      const opt = {
        margin:        [0.8, 0.8, 0.8, 0.8],
        filename:     `Laporan_Karyawan_65_${new Date().toISOString().slice(0,10)}.pdf`,
        image:        { type: 'jpeg', quality: 0.95 },
        html2canvas:  { scale: 2, letterRendering: true, useCORS: true, logging: false },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'landscape' }
      };

      html2pdf().set(opt).from(pdfContainer).save().then(function() {
        pdfContainer.style.display = 'none';
      }).catch(function(err) {
        console.warn('PDF export error:', err);
        alert('Gagal mengekspor PDF. Silakan coba lagi.');
        pdfContainer.style.display = 'none';
      });
    });

    // Inisialisasi dengan 65 data
    generateDummyData();

  })();
</script>
